<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Contractor Decision System</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:#fff;
padding:20px;
}
.container { max-width:900px; margin:auto;}

.card {
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

h1 { color:#38bdf8; }

input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:5px;
border:none;
}

button {
background:#38bdf8;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

.item {
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.small-btn {
padding:5px 10px;
margin:5px;
font-size:12px;
}

.delete { background:#ef4444; }
.edit { background:#f59e0b; }

.tag {
padding:4px 8px;
border-radius:5px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.risk { background:#ef4444; }
.over { background:#f59e0b; }
.smart { background:#22c55e; }

.result-box {
background:#334155;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🏗️ Contractor Decision System</h1>

<!-- ADD / EDIT -->
<div class="card">
<h2>إضافة / تعديل مقاول</h2>

<input id="name" placeholder="اسم المقاول">
<input id="price" placeholder="السعر">
<input id="clarity" placeholder="وضوح (1-5)">
<input id="org" placeholder="تنظيم (1-5)">
<input id="team" placeholder="فريق (1-5)">

<button onclick="save()">حفظ</button>

</div>

<!-- LIST -->
<div class="card">
<h2>📊 المقاولين</h2>
<div id="list"></div>
</div>

<!-- DECISION -->
<div class="card">
<h2>🏆 القرار النهائي</h2>

<button onclick="decide()">اختار الأفضل</button>

<div id="decision"></div>
</div>

</div>

<script>

let contractors = JSON.parse(localStorage.getItem("contractors")) || [];
let editIndex = -1;

function save(){

let name = document.getElementById("name").value;
let price = +document.getElementById("price").value;
let clarity = +document.getElementById("clarity").value;
let org = +document.getElementById("org").value;
let team = +document.getElementById("team").value;

if(!name || !price || !clarity || !org || !team){
alert("كمل البيانات");
return;
}

let score = clarity + org + team;

// تعديل
if(editIndex > -1){
contractors[editIndex] = {name, price, clarity, org, team, score};
editIndex = -1;
}
else{
// إضافة
contractors.push({name, price, clarity, org, team, score});
}

localStorage.setItem("contractors", JSON.stringify(contractors));

clearForm();
render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

if(contractors.length === 0) return;

// حساب السعر + القيمة
contractors.forEach(c=>{
c.priceNum = parseFloat(c.price) || 0;
c.value = c.score / c.priceNum;
});

// ترتيب حسب القيمة
contractors.sort((a,b)=>b.value - a.value);

let bestValue = contractors[0].value;

contractors.forEach((c,index)=>{

let tag = "";
let cls = "";

// تصنيف ذكي
if(c.score < 8){
tag="Risk";
cls="risk";
}
else if(c.value < bestValue * 0.7){
tag="Overpriced";
cls="over";
}
else{
tag="Smart Choice";
cls="smart";
}

list.innerHTML += `
<div class="item">
<b>${c.name}</b><br>
Score: ${c.score}<br>
السعر: ${c.price}<br>
Value: ${c.value.toFixed(5)}<br>
<span class="tag ${cls}">${tag}</span><br>

<button class="small-btn edit" onclick="edit(${index})">تعديل</button>
<button class="small-btn delete" onclick="remove(${index})">حذف</button>
</div>
`;
});
}

function edit(i){

let c = contractors[i];

document.getElementById("name").value = c.name;
document.getElementById("price").value = c.price;
document.getElementById("clarity").value = c.clarity;
document.getElementById("org").value = c.org;
document.getElementById("team").value = c.team;

editIndex = i;
}

function remove(i){

if(confirm("متأكد؟")){
contractors.splice(i,1);
localStorage.setItem("contractors", JSON.stringify(contractors));
render();
}

}

function clearForm(){
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("clarity").value = "";
document.getElementById("org").value = "";
document.getElementById("team").value = "";
}

function decide(){

if(contractors.length === 0){
document.getElementById("decision").innerHTML = "❌ ما عندك بيانات";
return;
}

// إعادة حساب
contractors.forEach(c=>{
c.priceNum = parseFloat(c.price) || 0;
c.value = c.score / c.priceNum;
});

// ترتيب
contractors.sort((a,b)=>b.value - a.value);

let best = contractors[0];

// متوسط السوق
let avgPrice = contractors.reduce((sum,c)=>sum + c.priceNum,0) / contractors.length;
let cheapest = contractors.reduce((a,b)=>a.priceNum < b.priceNum ? a : b);

// تحليل ذكي
let analysis = "";

if(best.score < 8){
analysis = "❌ هذا المقاول ضعيف حتى لو سعره جيد";
}
else if(best.priceNum > avgPrice * 1.3){
analysis = "🟡 هذا المقاول ممتاز لكن سعره مبالغ فيه";
}
else if(best === cheapest && best.score >= 9){
analysis = "🔥 أفضل صفقة بالسوق (جودة + سعر)";
}
else{
analysis = "✅ أفضل توازن بين الجودة والسعر";
}

// عرض
document.getElementById("decision").innerHTML = `
<div class="result-box">
<h3>🏆 الأفضل: ${best.name}</h3>
<p>Score: ${best.score}</p>
<p>السعر: ${best.price}</p>
<p>Value: ${best.value.toFixed(5)}</p>

<p>${analysis}</p>

<hr>

<p>💡 الأرخص: ${cheapest.name}</p>
<p>💡 متوسط السوق: ${Math.round(avgPrice)}</p>
</div>
`;
}

render();

</script>

</body>
</html>
