<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Contractor Decision System</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:#fff;
padding:20px;
}
.container { max-width:900px; margin:auto;}

.card {
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

h1 { color:#38bdf8; }

input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:5px;
border:none;
}

button {
background:#38bdf8;
border:none;
padding:12px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

.item {
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.best { border:2px solid #22c55e; }
.worst { border:2px solid #ef4444; }

</style>

</head>

<body>

<div class="container">

<h1>🏗️ Contractor Decision System</h1>

<div class="card">
<h2>إضافة مقاول</h2>

<input id="name" placeholder="اسم المقاول">
<input id="price" placeholder="السعر">

<label>وضوح (1-5)</label>
<input type="number" id="clarity">

<label>تنظيم (1-5)</label>
<input type="number" id="org">

<label>فريق (1-5)</label>
<input type="number" id="team">

<button onclick="add()">إضافة</button>

</div>

<div class="card">
<h2>📊 التقييم</h2>
<div id="list"></div>
</div>

<div class="card">
<h2>🏆 القرار</h2>
<button onclick="decide()">اختار الأفضل</button>
<div id="decision"></div>
</div>

</div>

<script>

let contractors = JSON.parse(localStorage.getItem("contractors")) || [];

function add(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let clarity = +document.getElementById("clarity").value;
let org = +document.getElementById("org").value;
let team = +document.getElementById("team").value;

if(!name || !clarity || !org || !team){
alert("كمل البيانات");
return;
}

let score = clarity + org + team;

contractors.push({name, price, score, clarity, org, team});

localStorage.setItem("contractors", JSON.stringify(contractors));

render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

if(contractors.length === 0) return;

contractors.sort((a,b)=>b.score - a.score);

let bestScore = contractors[0].score;
let worstScore = contractors[contractors.length-1].score;

contractors.forEach(c=>{

let className = "item";

if(c.score === bestScore) className += " best";
if(c.score === worstScore) className += " worst";

list.innerHTML += `
<div class="${className}">
<b>${c.name}</b><br>
السعر: ${c.price}<br>
Score: ${c.score}<br>
وضوح: ${c.clarity} | تنظيم: ${c.org} | فريق: ${c.team}
</div>
`;
});
}

function decide(){

if(contractors.length === 0){
document.getElementById("decision").innerHTML = "❌ ما عندك بيانات";
return;
}

contractors.sort((a,b)=>b.score - a.score);

let best = contractors[0];

let msg = `
🏆 الأفضل: ${best.name}<br>
Score: ${best.score}<br><br>
`;

if(best.score >= 12){
msg += "✅ مقاول قوي جدًا";
}
else if(best.score >= 8){
msg += "⚠️ مقبول لكن يحتاج تدقيق";
}
else{
msg += "❌ ضعيف — لا ينصح فيه";
}

document.getElementById("decision").innerHTML = msg;
}

render();

</script>

</body>
</html>
