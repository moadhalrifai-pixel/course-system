<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Contractor Decision System</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:#fff;
padding:20px;
}
.container { max-width:900px; margin:auto;}

.card {
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

h1 { color:#38bdf8; }

input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:5px;
border:none;
}

button {
background:#38bdf8;
border:none;
padding:12px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

.item {
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.best { border:2px solid #22c55e; }
.worst { border:2px solid #ef4444; }

.tag {
padding:3px 8px;
border-radius:5px;
font-size:12px;
display:inline-block;
margin-top:5px;
}

.risk { background:#ef4444; }
.over { background:#f59e0b; }
.smart { background:#22c55e; }

</style>

</head>

<body>

<div class="container">

<h1>🏗️ Contractor Decision System</h1>

<div class="card">
<h2>إضافة مقاول</h2>

<input id="name" placeholder="اسم المقاول">
<input id="price" placeholder="السعر">

<label>وضوح (1-5)</label>
<input type="number" id="clarity">

<label>تنظيم (1-5)</label>
<input type="number" id="org">

<label>فريق (1-5)</label>
<input type="number" id="team">

<button onclick="add()">إضافة</button>

</div>

<div class="card">
<h2>📊 التقييم</h2>
<div id="list"></div>
</div>

<div class="card">
<h2>🏆 القرار النهائي</h2>
<button onclick="decide()">اختار الأفضل</button>
<div id="decision"></div>
</div>

</div>

<script>

let contractors = JSON.parse(localStorage.getItem("contractors")) || [];

function add(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let clarity = +document.getElementById("clarity").value;
let org = +document.getElementById("org").value;
let team = +document.getElementById("team").value;

if(!name || !price || !clarity || !org || !team){
alert("كمل البيانات");
return;
}

let score = clarity + org + team;

contractors.push({name, price, score, clarity, org, team});

localStorage.setItem("contractors", JSON.stringify(contractors));

render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

if(contractors.length === 0) return;

// تحويل السعر رقم
contractors.forEach(c=>{
c.priceNum = parseFloat(c.price) || 0;
});

// حساب القيمة
contractors.forEach(c=>{
c.value = c.score / c.priceNum;
});

// ترتيب
contractors.sort((a,b)=>b.value - a.value);

let bestValue = contractors[0].value;
let worstScore = Math.min(...contractors.map(c=>c.score));

contractors.forEach(c=>{

let tag = "";
let tagClass = "";

// التصنيف
if(c.score <= 6){
tag = "Risk";
tagClass = "risk";
}
else if(c.value < bestValue * 0.6){
tag = "Overpriced";
tagClass = "over";
}
else{
tag = "Smart Choice";
tagClass = "smart";
}

list.innerHTML += `
<div class="item">
<b>${c.name}</b><br>
السعر: ${c.price}<br>
Score: ${c.score}<br>
وضوح: ${c.clarity} | تنظيم: ${c.org} | فريق: ${c.team}<br>
<span class="tag ${tagClass}">${tag}</span>
</div>
`;
});
}

function decide(){

if(contractors.length === 0){
document.getElementById("decision").innerHTML = "❌ ما عندك بيانات";
return;
}

// ترتيب حسب القيمة
contractors.sort((a,b)=>b.value - a.value);

let best = contractors[0];

let msg = `
🏆 <b>${best.name}</b><br>
Score: ${best.score}<br>
السعر: ${best.price}<br><br>
`;

// تحليل القرار
if(best.score >= 12){
msg += "🔥 أفضل توازن بين الجودة والسعر";
}
else if(best.score >= 9){
msg += "✅ خيار جيد لكن يحتاج تدقيق";
}
else{
msg += "⚠️ الخيار الأفضل نسبيًا لكن فيه مخاطرة";
}

// تحليل السوق
let cheapest = contractors.reduce((a,b)=>a.priceNum < b.priceNum ? a : b);
let highest = contractors.reduce((a,b)=>a.priceNum > b.priceNum ? a : b);

msg += `<br><br>💡 الأرخص: ${cheapest.name}`;
msg += `<br>💡 الأغلى: ${highest.name}`;

document.getElementById("decision").innerHTML = msg;
}

render();

</script>

</body>
</html>
