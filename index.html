<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Contractor System</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:#fff;
padding:20px;
}
.container { max-width:900px; margin:auto;}

.card {
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:10px;
}

h1 { color:#38bdf8; }

input {
width:100%;
padding:10px;
margin-top:8px;
border-radius:5px;
border:none;
}

button {
background:#38bdf8;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

.item {
background:#334155;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.small-btn {
padding:5px 10px;
margin:5px;
font-size:12px;
}

.delete { background:#ef4444; }
.edit { background:#f59e0b; }

</style>

</head>

<body>

<div class="container">

<h1>🏗️ Contractor Decision System</h1>

<div class="card">
<h2>إضافة / تعديل مقاول</h2>

<input id="name" placeholder="اسم المقاول">
<input id="price" placeholder="السعر">
<input id="clarity" placeholder="وضوح (1-5)">
<input id="org" placeholder="تنظيم (1-5)">
<input id="team" placeholder="فريق (1-5)">

<button onclick="save()">حفظ</button>

</div>

<div class="card">
<h2>📊 المقاولين</h2>
<div id="list"></div>
</div>

</div>

<script>

let contractors = JSON.parse(localStorage.getItem("contractors")) || [];
let editIndex = -1;

function save(){

let name = document.getElementById("name").value;
let price = +document.getElementById("price").value;
let clarity = +document.getElementById("clarity").value;
let org = +document.getElementById("org").value;
let team = +document.getElementById("team").value;

if(!name) return alert("اكتب الاسم");

let score = clarity + org + team;

// تعديل
if(editIndex > -1){
contractors[editIndex] = {name, price, clarity, org, team, score};
editIndex = -1;
}
else{
// إضافة
contractors.push({name, price, clarity, org, team, score});
}

localStorage.setItem("contractors", JSON.stringify(contractors));

clearForm();
render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML = "";

if(contractors.length === 0) return;

// حساب السعر + القيمة
contractors.forEach(c=>{
c.priceNum = parseFloat(c.price) || 0;
c.value = c.score / c.priceNum;
});

// ترتيب حسب القيمة
contractors.sort((a,b)=>b.value - a.value);

let bestValue = contractors[0].value;

contractors.forEach(c=>{

let tag = "";
let cls = "";

// 🔥 التصنيف الحقيقي
if(c.score < 8){
tag="Risk";
cls="risk";
}
else if(c.value < bestValue * 0.7){
tag="Overpriced";
cls="over";
}
else{
tag="Smart Choice";
cls="smart";
}

list.innerHTML += `
<div class="item">
<b>${c.name}</b><br>
Score: ${c.score}<br>
السعر: ${c.price}<br>
Value: ${c.value.toFixed(5)}<br>
<span class="tag ${cls}">${tag}</span>
</div>
`;
});
}

function edit(i){

let c = contractors[i];

document.getElementById("name").value = c.name;
document.getElementById("price").value = c.price;
document.getElementById("clarity").value = c.clarity;
document.getElementById("org").value = c.org;
document.getElementById("team").value = c.team;

editIndex = i;
}

function remove(i){

if(confirm("متأكد؟")){
contractors.splice(i,1);
localStorage.setItem("contractors", JSON.stringify(contractors));
render();
}

}

function clearForm(){
document.getElementById("name").value = "";
document.getElementById("price").value = "";
document.getElementById("clarity").value = "";
document.getElementById("org").value = "";
document.getElementById("team").value = "";
}

render();
function decide(){

if(contractors.length === 0){
document.getElementById("decision").innerHTML = "❌ ما عندك بيانات";
return;
}

// ترتيب حسب القيمة
contractors.sort((a,b)=>b.value - a.value);

let best = contractors[0];

let msg = `
🏆 الأفضل: <b>${best.name}</b><br>
Score: ${best.score}<br>
السعر: ${best.price}<br>
Value: ${best.value.toFixed(5)}<br><br>
`;

// تحليل احترافي
if(best.value > 0.0005){
msg += "🔥 أفضل توازن بين الجودة والسعر";
}
else if(best.score >= 10){
msg += "⚠️ جودة عالية لكن سعره مبالغ فيه";
}
else{
msg += "❌ لا يوجد خيار قوي — تحتاج إعادة تقييم";
}

// مقارنة السوق
let cheapest = contractors.reduce((a,b)=>a.priceNum < b.priceNum ? a : b);

msg += `<br><br>💡 الأرخص: ${cheapest.name}`;

document.getElementById("decision").innerHTML = msg;
}
</script>

</body>
</html>
