<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Lesson 1</title>

<style>
body {
font-family: Arial;
background:#111;
color:#fff;
padding:20px;
line-height:1.8;
}
.container {
max-width:700px;
margin:auto;
}
.card {
background:#222;
padding:15px;
margin-top:15px;
border-radius:8px;
}
h1 {
color:#0f0;
}
button {
background:#0f0;
border:none;
padding:12px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}
button:hover {
opacity:0.9;
}
.red { color:#ff4d4d; }
.green { color:#0f0; }
</style>

</head>

<body>

<div class="container">

<h1>🎬 ليش تختار مقاول غلط؟</h1>

<div class="card">
🧠 أغلب الناس تختار بناءً على شعور… مو نظام
</div>

<div class="card">
⚠️ <b>Red Flags:</b><br>
- ارتحت له بسرعة<br>
- توصية فقط<br>
- استعجال
</div>

<div class="card">
<input id="name" placeholder="اكتب اسم المقاول" style="width:100%; padding:10px;">
</div>

<div class="card">

<h3>ليش اخترته؟</h3>

<button onclick="analyze('راحة')">ارتحت له</button>
<button onclick="analyze('توصية')">توصية</button>
<button onclick="analyze('سعر')">سعر مناسب</button>
<button onclick="analyze('خبرة')">خبرة</button>

</div>

<div class="card" id="out"></div>

</div>

<script>

function analyze(type){

let name = document.getElementById("name").value;

if(!name){
document.getElementById("out").innerHTML = "⚠️ اكتب اسم المقاول أولاً";
return;
}

let result = "";
let profile = "";

// التحليل
if(type === "راحة"){
result = "⚠️ اختيارك عاطفي — هذا أخطر نوع";
profile = "عاطفي";
}
else if(type === "توصية"){
result = "⚠️ التوصية مفيدة… لكنها غير كافية";
profile = "تابع للآخرين";
}
else if(type === "سعر"){
result = "⚠️ السعر لحاله يسبب مشاكل لاحقًا";
profile = "باحث عن الأرخص";
}
else if(type === "خبرة"){
result = "✅ هذا بداية صح… لكن تحتاج تحقق";
profile = "واعي جزئيًا";
}

// حفظ البيانات
localStorage.setItem("contractor_name", name);
localStorage.setItem("user_type", profile);

// عرض النتيجة
document.getElementById("out").innerHTML =
"🔍 تحليل اختيارك لـ <b>" + name + "</b><br><br>" +
result +
"<br><br>🧠 نوعك: <b>" + profile + "</b>";

}

</script>

</body>
</html>
